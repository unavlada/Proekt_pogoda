<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода на Flask</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1c1e21; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .weather-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 360px; text-align: center; }
        h2 { margin-top: 0; color: #333; }
        .form-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: #007aff; }
        button { padding: 12px 18px; border: none; background: #007aff; color: white; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 500; }
        button:hover { background: #0063cc; }
        .info-block { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .info-line { margin: 8px 0; font-size: 16px; }
        .error { color: #dc3545; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="weather-card">
        <h2>Прогноз погоды</h2>
        
        <form method="POST" action="/">
            <div class="form-group">
                <input type="text" name="city" placeholder="Введите город..." value="{{ city }}" required>
                <button type="submit">Найти</button>
            </div>
        </form>

        <!-- Если данные успешно получены — выводим карточку погоды -->
        {% if weather %}
            <div class="info-block">
                <h3>{{ weather.city }}</h3>
                <div class="info-line">🌡️ <b>Температура:</b> {{ weather.temp }}°C</div>
                <div class="info-line">☁️ <b>Состояние:</b> {{ weather.desc }}</div>
                <div class="info-line">💧 <b>Влажность:</b> {{ weather.humidity }}%</div>
            </div>
        {% endif %}

        <!-- Если произошла ошибка — показываем текст ошибки -->
        {% if error %}
            <div class="error">⚠️ {{ error }}</div>
        {% endif %}
    </div>

</body>
</html>
